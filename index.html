<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting to Outlet...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #FFF8F6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      border: 0.5px solid rgba(0, 0, 0, 0.1);
      padding: 48px 40px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }

    .logo {
      height: 36px;
      object-fit: contain;
      margin-bottom: 36px;
    }

    /* Spinner */
    .spinner-wrap {
      width: 48px;
      height: 48px;
      margin: 0 auto 24px;
    }

    .spinner-wrap svg {
      animation: spin 1.1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .loading-title {
      font-size: 15px;
      font-weight: 500;
      color: #1a1a1a;
      margin: 0 0 6px;
    }

    .loading-sub {
      font-size: 13px;
      color: #888;
      margin: 0;
    }

    /* Error state */
    #errorState { display: none; }

    .error-icon {
      width: 48px;
      height: 48px;
      background: #FAECE7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }

    .error-title {
      font-size: 15px;
      font-weight: 500;
      color: #1a1a1a;
      margin: 0 0 6px;
    }

    .error-msg {
      font-size: 13px;
      color: #888;
      margin: 0 0 24px;
    }

    .home-btn {
      display: inline-block;
      padding: 10px 24px;
      background: #FF583A;
      color: white;
      font-size: 14px;
      font-weight: 500;
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.2s;
    }

    .home-btn:hover { background: #e64a2e; }

    .countdown {
      font-size: 12px;
      color: #aaa;
      margin: 16px 0 0;
    }
  </style>
</head>
<body>
  <div class="card">

    <img src="https://web.mealpe.app/assets/brandLogo-DRkFh95a.png" alt="MealPe" class="logo" />

    <div id="loadingState">
      <div class="spinner-wrap">
        <svg viewBox="0 0 48 48" width="48" height="48">
          <circle cx="24" cy="24" r="20" fill="none" stroke="#F5E0DB" stroke-width="4"/>
          <path d="M24 4 a20 20 0 0 1 20 20" fill="none" stroke="#FF583A" stroke-width="4" stroke-linecap="round"/>
        </svg>
      </div>
      <p class="loading-title">Taking you to the menu</p>
      <p class="loading-sub">Hang tight, we're finding your outlet...</p>
    </div>

    <div id="errorState">
      <div class="error-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#D85A30" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </div>
      <p class="error-title">Outlet not found</p>
      <p class="error-msg" id="errorMsg">We couldn't find the outlet you're looking for.</p>
      <a href="https://web.mealpe.app/home" class="home-btn">Browse all outlets</a>
      <p class="countdown">Redirecting automatically in <span id="countdown">5</span>s</p>
    </div>

  </div>

  <script>
    const BACKEND_API = "https://mealpe-app-and-corporate-backend.onrender.com";
    const WEBAPP_URL  = "https://web.mealpe.app";

    function showError(msg) {
      document.getElementById("loadingState").style.display = "none";
      document.getElementById("errorState").style.display  = "block";
      document.getElementById("errorMsg").innerHTML = msg;

      let secs = 5;
      const cd = document.getElementById("countdown");
      const iv = setInterval(() => {
        secs--;
        if (cd) cd.textContent = secs;
        if (secs <= 0) {
          clearInterval(iv);
          window.location.href = WEBAPP_URL + "/home";
        }
      }, 1000);
    }

    const slug = window.location.pathname.substring(1).toLowerCase();

    if (!slug || slug === "" || slug === "/") {
      showError("Invalid outlet link. Please check the URL.");
    } else {
      fetch(BACKEND_API + "/redirect/outlet/" + slug)
        .then(r => {
          if (!r.ok) throw new Error(r.status);
          return r.json();
        })
        .then(data => {
          if (!data.success || !data.data || !data.data.outletId) throw new Error("not found");
          window.location.href = WEBAPP_URL + "/outlet/" + data.data.outletId;
        })
        .catch(() => {
          showError("We couldn't find an outlet for <strong>" + slug + "</strong>.");
        });
    }
  </script>
</body>
</html>
